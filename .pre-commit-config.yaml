repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (backend)
        files: ^backend/
        types_or: [python, pyi]
        args: [--fix, --config, backend/pyproject.toml]
      - id: ruff-format
        name: ruff format (backend)
        files: ^backend/
        types_or: [python, pyi]
        args: [--config, backend/pyproject.toml]

  - repo: local
    hooks:
      - id: frontend-qa
        name: frontend (lint, format, typecheck, tests)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/frontend" && npm run test:ci'
        language: system
        pass_filenames: false
        files: ^frontend/
