# Render Blueprint: https://render.com/docs/blueprint-spec
# After deploy, set (in dashboard or here):
#   DJANGO_CSRF_TRUSTED_ORIGINS — your Vercel app, e.g. https://your-app.vercel.app
#   DJANGO_CORS_ALLOWED_ORIGINS — same origin(s) as the browser SPA (comma-separated)
#   DJANGO_CROSS_SITE_COOKIES — "true" when the SPA is on Vercel and the API on Render (SameSite=None)
databases:
  - name: patient-mgmt-db
    plan: free
    databaseName: patient_mgmt
    user: patient_mgmt

services:
  - type: web
    name: patient-mgmt-api
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_HTTPS_DEPLOYMENT
        value: "true"
      # On Render, settings.py appends RENDER_EXTERNAL_HOSTNAME to ALLOWED_HOSTS (actual *.onrender.com host,
      # including suffixes). Set DJANGO_ALLOWED_HOSTS in the dashboard only for custom domains, etc.
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CROSS_SITE_COOKIES
        value: "true"
      - key: SEED_DEMO
        value: "0"
      - key: POSTGRES_DB
        fromDatabase:
          name: patient-mgmt-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: patient-mgmt-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: patient-mgmt-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: patient-mgmt-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: patient-mgmt-db
          property: port
