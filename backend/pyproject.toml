[tool.ruff]
target-version = "py312"
line-length = 100
src = ["."]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # Pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # bugbear
  "C4",  # comprehensions
  "SIM", # simplify
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/migrations/*" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = [
  "accounts",
  "appointments",
  "clinicians",
  "clinics",
  "config",
  "patients",
]
