name: CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_DB_ENGINE: sqlite
      DJANGO_SECRET_KEY: ci-not-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff (lint + format)
        run: ruff check . --config pyproject.toml && ruff format --check . --config pyproject.toml
      - name: Django system check
        run: python manage.py check
      - name: Verify no missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: python manage.py test patients appointments -v 2

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint, format, typecheck, unit tests
        run: npm run test:ci
      - name: Production build
        env:
          VITE_API_ROOT: /api
        run: npm run build
